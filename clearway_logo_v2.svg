<svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2b2f30"/>
      <stop offset="100%" stop-color="#1a1c1d"/>
    </linearGradient>
  </defs>

  <!-- Badge background -->
  <rect x="0" y="0" width="240" height="240" rx="48" fill="url(#bg2)"/>

  <!-- Motion lines trailing behind, suggesting continuous movement -->
  <g stroke="#e8a324" stroke-width="4" stroke-linecap="round" opacity="0.55">
    <line x1="18" y1="150" x2="40" y2="150"/>
    <line x1="14" y1="163" x2="42" y2="163"/>
    <line x1="20" y1="176" x2="38" y2="176"/>
  </g>

  <!-- Ground line -->
  <line x1="30" y1="196" x2="212" y2="196" stroke="#3a3d3e" stroke-width="4" stroke-linecap="round"/>

  <!-- Bicycle frame, drawn as one clean line-art silhouette -->
  <g fill="none" stroke="#f4f1ea" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
    <!-- rear wheel -->
    <circle cx="76" cy="164" r="30"/>
    <!-- seat tube -->
    <line x1="98" y1="164" x2="88" y2="104"/>
    <!-- chain stay -->
    <line x1="76" y1="164" x2="98" y2="164"/>
    <!-- seat stay -->
    <line x1="76" y1="164" x2="88" y2="104"/>
    <!-- saddle -->
    <path d="M 76 100 Q 88 94 102 100" stroke-width="7"/>
    <!-- top tube -->
    <line x1="88" y1="104" x2="150" y2="112"/>
    <!-- down tube -->
    <line x1="98" y1="164" x2="150" y2="112"/>
    <!-- head tube / stem -->
    <line x1="150" y1="112" x2="146" y2="86"/>
    <!-- handlebar drop -->
    <path d="M 126 90 Q 146 82 158 92 Q 164 98 156 104" stroke-width="6"/>
    <!-- fork -->
    <line x1="150" y1="112" x2="164" y2="164"/>
    <!-- crank / pedal -->
    <circle cx="98" cy="164" r="5" fill="#f4f1ea"/>
    <line x1="98" y1="164" x2="112" y2="176"/>
    <line x1="98" y1="164" x2="84" y2="152"/>
  </g>

  <!-- Front wheel doubles as a play button: "no need to stop, press play" -->
  <circle cx="164" cy="164" r="30" fill="#1a1c1d" stroke="#e8a324" stroke-width="7"/>
  <path d="M 156 150 L 180 164 L 156 178 Z" fill="#e8a324"/>
</svg>
